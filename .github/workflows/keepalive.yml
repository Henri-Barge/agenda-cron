name: Keepalive
on:
  schedule:
    - cron: "17 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Leeren Commit pushen
        run: |
          git config user.name "agenda-keepalive"
          git config user.email "actions@users.noreply.github.com"
          git commit --allow-empty -m "keepalive: Scheduled-Workflows aktiv halten"
          git push
