name: Agenda Tick
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Erinnerungs-Tick senden
        run: |
          curl -fsS -m 25 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" "https://webfriends-website.vercel.app/api/tick"
